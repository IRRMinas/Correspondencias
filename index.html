<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Expeditório - Correios</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-6 space-y-6">
    <div class="flex justify-between items-center border-b border-slate-800 pb-4">
      <div>
        <h1 class="text-xl font-bold text-white tracking-tight">PostManager API</h1>
        <p class="text-xs text-slate-400">Roteamento Inteligente Google Sheets</p>
      </div>
      <a href="dashboard.html" class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2 px-3 rounded-lg transition">Dashboard 📊</a>
    </div>

    <form id="formCorreio" class="space-y-4">
      <div>
        <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Data do Envio (Coluna H)</label>
        <input type="date" id="data" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 transition text-white">
      </div>

      <div>
        <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Grupo / Setor (Coluna F)</label>
        <select id="grupo" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 transition text-white">
          <option value="">Selecione...</option>
          <option value="Diretoria/ IRR">Diretoria/ IRR</option>
          <option value="GIPB">GIPB</option>
          <option value="QPNB">QPNB</option>
          <option value="PSPS">PSPS</option>
          <option value="ICM">ICM</option>
          <option value="IP">IP</option>
          <option value="TRIATO">TRIATO</option>
          <option value="WMP">WMP</option>
          <option value="DCE">DCE</option>
          <option value="HMM">HMM</option>
          <option value="MV">MV</option>
          <option value="CRL">CRL</option>
          <option value="Memórias">Memórias</option>
          <option value="SENS">SENS</option>
          <option value="NESPE">NESPE</option>
          <option value="SGP">SGP</option>
          <option value="NGS">NGS</option>
        </select>
      </div>

      <div>
        <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Pesquisador / Remetente (Coluna E)</label>
        <input type="text" id="remetente" placeholder="Ex: Dr. Rômulo Paes" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 transition text-white placeholder-slate-600">
      </div>

      <div>
        <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Valor do Envio (Coluna G)</label>
        <input type="text" id="valor" placeholder="R$ 0,00" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 font-mono text-lg focus:outline-none focus:border-indigo-500 transition text-emerald-400 placeholder-slate-600">
      </div>

      <button type="submit" id="btnSalvar" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg transition active:scale-[0.98]">
        Salvar Registro
      </button>
    </form>

    <div id="status" class="hidden text-center text-xs p-3 rounded-xl font-medium"></div>
  </div>

  <script>
    // ⚠️ SUBSTITUA COM A URL QUE VOCÊ COPIOU DO GOOGLE APPS SCRIPT
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwaW0w4Qq51QtADMdwJrVlNlb0QzGn_s14EKvmYiFK4p6ncY3npY7FaenzCZXW5_lzwHw/exec";

    document.getElementById('data').value = new Date().toISOString().split('T')[0];

    document.getElementById('valor').addEventListener('input', e => {
      let v = e.target.value.replace(/\D/g, "");
      v = (v / 100).toFixed(2) + "";
      v = v.replace(".", ",");
      v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
      v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
      e.target.value = v ? "R$ " + v : "";
    });

    document.getElementById('formCorreio').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btnSalvar');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      btn.innerText = "Processando Roteamento...";
      status.className = "text-center text-xs p-3 rounded-xl font-medium bg-slate-800 text-slate-300 block";
      status.innerText = "Conectando ao banco de dados Google Sheets...";

      const payload = {
        data: document.getElementById('data').value,
        grupo: document.getElementById('grupo').value,
        remetente: document.getElementById('remetente').value,
        valor: document.getElementById('valor').value
      };

      try {
        const resposta = await fetch(WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors', // Evita bloqueios de segurança corporativos
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        status.className = "text-center text-xs p-3 rounded-xl font-medium bg-emerald-950 border border-emerald-800 text-emerald-400 block";
        status.innerText = "Lançamento computado com sucesso!";
        document.getElementById('remetente').value = '';
        document.getElementById('valor').value = '';
      } catch (err) {
        status.className = "text-center text-xs p-3 rounded-xl font-medium bg-rose-950 border border-rose-800 text-rose-400 block";
        status.innerText = "Falha ao registrar: " + err.message;
      } finally {
        btn.disabled = false;
        btn.innerText = "Salvar Registro";
      }
    });
  </script>
</body>
</html>

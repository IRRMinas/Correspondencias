<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔍 Busca - Correios IRR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .bg-dark { background: #0a0a0f; }
    .bg-card { background: #12121e; }
    .border-card { border-color: #2a2a3a; }
    input, select { background: #1a1a2e; border: 1px solid #2a2a3a; color: #e2e8f0; }
    input:focus, select:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
    input::placeholder { color: #4a4a5a; }
  </style>
</head>
<body class="bg-dark text-slate-200 min-h-screen">

  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-indigo-600/20 flex items-center justify-center">
          <i class="fas fa-search text-indigo-400 text-lg"></i>
        </div>
        <div>
          <h1 class="text-2xl font-extrabold text-white tracking-tight">Busca de Registros</h1>
          <p class="text-xs text-slate-500">Encontre qualquer envio por filtros</p>
        </div>
      </div>
      <div class="flex gap-2">
        <a href="index.html" class="px-4 py-2 rounded-xl bg-card border border-card hover:border-indigo-500/50 text-sm text-slate-400 hover:text-white transition flex items-center gap-2">
          <i class="fas fa-plus"></i> Novo
        </a>
        <a href="dashboard.html" class="px-4 py-2 rounded-xl bg-card border border-card hover:border-indigo-500/50 text-sm text-slate-400 hover:text-white transition flex items-center gap-2">
          <i class="fas fa-chart-pie"></i> Dashboard
        </a>
      </div>
    </div>

    <!-- FILTROS -->
    <div class="bg-card border border-card rounded-2xl p-6 glow mb-6">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">
            <i class="fas fa-search mr-1"></i> Busca Geral
          </label>
          <input type="text" id="buscaGeral" placeholder="Destinatário, remetente, grupo..." class="w-full rounded-xl px-4 py-3 text-sm transition">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">
            <i class="fas fa-users mr-1"></i> Grupo
          </label>
          <select id="filtroGrupo" class="w-full rounded-xl px-4 py-3 text-sm transition">
            <option value="">Todos</option>
            <option value="Diretoria/ IRR">Diretoria/ IRR</option>
            <option value="GIPB">GIPB</option>
            <option value="QPNB">QPNB</option>
            <option value="PSPS">PSPS</option>
            <option value="ICM">ICM</option>
            <option value="IP">IP</option>
            <option value="TRIATO">TRIATO</option>
            <option value="WMP">WMP</option>
            <option value="DCE">DCE</option>
            <option value="HMM">HMM</option>
            <option value="MV">MV</option>
            <option value="CRL">CRL</option>
            <option value="Memórias">Memórias</option>
            <option value="SENS">SENS</option>
            <option value="NESPE">NESPE</option>
            <option value="SGP">SGP</option>
            <option value="NGS">NGS</option>
            <option value="GFP">GFP</option>
            <option value="BMIM">BMIM</option>
            <option value="CVIP">CVIP</option>
            <option value="GEL">GEL</option>
            <option value="PCPP">PCPP</option>
            <option value="VDE">VDE</option>
            <option value="SEC">SEC</option>
            <option value="ASFOC">ASFOC</option>
            <option value="FIOSÁÚDE">FIOSÁÚDE</option>
            <option value="COLVET">COLVET</option>
            <option value="IB">IB</option>
            <option value="BIOTÉRIO">BIOTÉRIO</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">
            <i class="fas fa-user-pen mr-1"></i> Remetente
          </label>
          <input type="text" id="filtroRemetente" placeholder="Nome do remetente" class="w-full rounded-xl px-4 py-3 text-sm transition">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">
            <i class="fas fa-id-badge mr-1"></i> Responsável (quem registrou)
          </label>
          <input type="text" id="filtroResponsavel" placeholder="Nome de quem lançou" class="w-full rounded-xl px-4 py-3 text-sm transition">
        </div>
      </div>
      <div class="flex gap-4 mt-4">
        <button id="btnBuscar" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-6 py-2.5 rounded-xl transition flex items-center gap-2 text-sm">
          <i class="fas fa-search"></i> Buscar
        </button>
        <button id="btnLimpar" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-6 py-2.5 rounded-xl transition text-sm">
          <i class="fas fa-undo"></i> Limpar
        </button>
      </div>
    </div>

    <!-- RESULTADOS -->
    <div class="bg-card border border-card rounded-2xl overflow-hidden">
      <div class="p-5 border-b border-card flex items-center justify-between">
        <h3 class="text-sm font-semibold text-white flex items-center gap-2">
          <i class="fas fa-list text-indigo-400"></i> Resultados
          <span id="totalResultados" class="text-xs text-slate-500 font-normal ml-2"></span>
        </h3>
        <span class="text-xs text-slate-500"><i class="far fa-clock mr-1"></i> Ordenado por data</span>
      </div>
      <div id="resultadosContainer" class="divide-y divide-slate-800/50">
        <div class="px-5 py-12 text-center text-slate-500">
          <i class="fas fa-search text-2xl block mb-3"></i>
          Use os filtros acima para encontrar registros
        </div>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwxEYSl-eQB72JCk0ePJfhSZRk5I2KOH15OWFF5F8NnR1bNdnD3_stgmT4COzK3Fuwk2w/exec";

    let ultimosRegistros = []; // guarda a última busca para poder editar sem refazer o fetch
    let editandoId = null;     // id do registro com o formulário de edição aberto no momento

    function formatMoney(value) {
      return 'R$ ' + value.toFixed(2).replace('.', ',');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const texto = String(dateStr).trim();

      // Formato ISO (yyyy-mm-dd), gerado quando a célula era um Date de verdade
      let m = texto.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return `${m[3]}/${m[2]}/${m[1]}`;

      // Texto digitado manualmente como dd/mm/yyyy - o construtor nativo Date()
      // interpreta isso como mm/dd/yyyy e quebra quando o dia é > 12, por isso
      // fazemos o parse manual aqui em vez de usar `new Date(texto)`
      m = texto.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})/);
      if (m) return `${m[1].padStart(2, '0')}/${m[2].padStart(2, '0')}/${m[3]}`;

      return texto || '-';
    }

    async function buscarRegistros() {
      const params = new URLSearchParams();
      params.append('acao', 'buscar');
      
      const buscaGeral = document.getElementById('buscaGeral').value.trim();
      const filtroGrupo = document.getElementById('filtroGrupo').value;
      const filtroRemetente = document.getElementById('filtroRemetente').value.trim();
      const filtroResponsavel = document.getElementById('filtroResponsavel').value.trim();

      if (buscaGeral) params.append('busca', buscaGeral);
      if (filtroGrupo) params.append('grupo', filtroGrupo);
      if (filtroRemetente) params.append('remetente', filtroRemetente);
      if (filtroResponsavel) params.append('responsavel', filtroResponsavel);

      const container = document.getElementById('resultadosContainer');
      const totalSpan = document.getElementById('totalResultados');
      
      container.innerHTML = `
        <div class="px-5 py-12 text-center text-slate-500">
          <i class="fas fa-spinner fa-spin text-2xl block mb-3"></i>
          Buscando...
        </div>
      `;

      try {
        const response = await fetch(`${WEB_APP_URL}?${params.toString()}`);
        const data = await response.json();

        if (!data.sucesso) {
          throw new Error(data.mensagem);
        }

        ultimosRegistros = data.registros;
        totalSpan.textContent = `(${data.total} registros)`;
        renderResultados();

      } catch (err) {
        container.innerHTML = `
          <div class="px-5 py-12 text-center text-rose-400">
            <i class="fas fa-exclamation-triangle text-2xl block mb-3"></i>
            Erro: ${err.message}
          </div>
        `;
      }
    }

    function renderResultados() {
      const container = document.getElementById('resultadosContainer');
      const totalSpan = document.getElementById('totalResultados');
      totalSpan.textContent = `(${ultimosRegistros.length} registros)`;

      if (ultimosRegistros.length === 0) {
        container.innerHTML = `
          <div class="px-5 py-12 text-center text-slate-500">
            <i class="fas fa-inbox text-2xl block mb-3"></i>
            Nenhum registro encontrado com os filtros aplicados
          </div>
        `;
        return;
      }

      container.innerHTML = ultimosRegistros.map(r => `
        <div class="p-4 hover:bg-slate-900/30 transition">
          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="text-xs font-medium text-slate-400">${formatDate(r.data)}</span>
                <span class="bg-indigo-600/20 text-indigo-300 text-[10px] font-bold px-2 py-0.5 rounded-full">${r.grupo || '-'}</span>
                <span class="text-[10px] text-slate-500">${r.tipoEnvio || 'SEDEX'}</span>
                ${!r.valor ? `<span class="bg-amber-500/20 text-amber-300 text-[10px] font-bold px-2 py-0.5 rounded-full"><i class="fas fa-clock mr-1"></i>Aguardando valor</span>` : ''}
              </div>
              <p class="text-sm font-medium text-white whitespace-pre-line break-words">${r.destinatario || 'Sem destinatário'}</p>
              <div class="flex gap-3 text-xs text-slate-500 mt-0.5 flex-wrap">
                <span><i class="fas fa-user-pen mr-1"></i> ${r.remetente || '-'}</span>
                <span><i class="fas fa-id-badge mr-1"></i> ${r.responsavel || '-'}</span>
                <span><i class="fas fa-hashtag mr-1"></i> ${r.quantidade || 1}</span>
                ${r.codigoRastreio ? `<span><i class="fas fa-barcode mr-1"></i> ${r.codigoRastreio}</span>` : ''}
              </div>
              ${r.observacao ? `<p class="text-xs text-slate-400 mt-1 whitespace-pre-line break-words"><i class="fas fa-comment mr-1"></i> ${r.observacao}</p>` : ''}
            </div>
            <div class="flex items-center gap-3">
              <div class="text-right">
                <p class="text-lg font-bold ${r.valor ? 'text-emerald-400' : 'text-slate-600'}">${r.valor ? formatMoney(r.valor) : '—'}</p>
                <span class="text-xs text-slate-500">${r.mes || ''}</span>
              </div>
              ${r.id ? `
                <button class="btn-editar w-9 h-9 flex items-center justify-center rounded-lg bg-slate-800 hover:bg-indigo-600 text-slate-300 hover:text-white transition" data-id="${r.id}" title="Editar / completar dados">
                  <i class="fas fa-pen text-xs"></i>
                </button>
              ` : ''}
            </div>
          </div>
          ${editandoId === r.id ? renderFormEdicao(r) : ''}
        </div>
      `).join('');
    }

    function renderFormEdicao(r) {
      return `
        <div class="mt-3 p-4 bg-slate-950/50 rounded-xl border border-indigo-500/30">
          <p class="text-xs text-slate-400 mb-3"><i class="fas fa-circle-info mr-1"></i> Complete os dados quando o Correio informar o retorno. Campos deixados em branco não são alterados.</p>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div>
              <label class="block text-[10px] uppercase tracking-wider text-slate-500 mb-1">Valor (R$)</label>
              <input type="text" id="edit-valor-${r.id}" value="${r.valor ? r.valor.toFixed(2).replace('.', ',') : ''}" placeholder="0,00" class="w-full rounded-lg px-3 py-2 text-sm transition">
            </div>
            <div>
              <label class="block text-[10px] uppercase tracking-wider text-slate-500 mb-1">Código de Rastreio</label>
              <input type="text" id="edit-rastreio-${r.id}" value="${r.codigoRastreio || ''}" placeholder="BR123456789BR" class="w-full rounded-lg px-3 py-2 text-sm transition">
            </div>
            <div>
              <label class="block text-[10px] uppercase tracking-wider text-slate-500 mb-1">Observação</label>
              <input type="text" id="edit-observacao-${r.id}" value="${r.observacao || ''}" class="w-full rounded-lg px-3 py-2 text-sm transition">
            </div>
          </div>
          <div class="flex gap-2 mt-3">
            <button class="btn-salvar-edicao bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold px-4 py-2 rounded-lg transition" data-id="${r.id}">
              <i class="fas fa-check mr-1"></i> Salvar
            </button>
            <button class="btn-cancelar-edicao bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-semibold px-4 py-2 rounded-lg transition" data-id="${r.id}">
              Cancelar
            </button>
          </div>
        </div>
      `;
    }

    async function salvarEdicao(id) {
      const valorInput = document.getElementById(`edit-valor-${id}`).value.trim();
      const rastreioInput = document.getElementById(`edit-rastreio-${id}`).value.trim();
      const obsInput = document.getElementById(`edit-observacao-${id}`).value.trim();

      const btnSalvar = document.querySelector(`.btn-salvar-edicao[data-id="${id}"]`);
      if (btnSalvar) {
        btnSalvar.disabled = true;
        btnSalvar.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> Salvando...';
      }

      const payload = {
        acao: 'editar',
        id: id,
        valor: valorInput,
        codigoRastreio: rastreioInput,
        observacao: obsInput
      };

      try {
        // O Apps Script não responde com CORS liberado para POST, então usamos
        // no-cors (não conseguimos ler a resposta, mas a gravação acontece normalmente)
        await fetch(WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        // Atualiza otimisticamente na tela
        const registro = ultimosRegistros.find(r => String(r.id) === String(id));
        if (registro) {
          registro.valor = parseFloat(valorInput.replace(',', '.')) || registro.valor || 0;
          registro.codigoRastreio = rastreioInput;
          registro.observacao = obsInput;
        }
        editandoId = null;
        renderResultados();

        // Confirma com o servidor um pouco depois, garantindo que a tela reflita o que foi salvo de fato
        setTimeout(buscarRegistros, 1500);

      } catch (err) {
        alert('Erro ao salvar: ' + err.message);
        if (btnSalvar) {
          btnSalvar.disabled = false;
          btnSalvar.innerHTML = '<i class="fas fa-check mr-1"></i> Salvar';
        }
      }
    }

    // Eventos de busca
    document.getElementById('btnBuscar').addEventListener('click', buscarRegistros);
    document.getElementById('btnLimpar').addEventListener('click', () => {
      document.getElementById('buscaGeral').value = '';
      document.getElementById('filtroGrupo').value = '';
      document.getElementById('filtroRemetente').value = '';
      document.getElementById('filtroResponsavel').value = '';
      buscarRegistros();
    });

    // Enter em qualquer campo de texto dispara a busca
    ['buscaGeral', 'filtroRemetente', 'filtroResponsavel'].forEach(idCampo => {
      document.getElementById(idCampo).addEventListener('keyup', (e) => {
        if (e.key === 'Enter') buscarRegistros();
      });
    });

    // Eventos de edição (delegados no container, pois os cards são recriados a cada render)
    document.getElementById('resultadosContainer').addEventListener('click', (e) => {
      const btnEditar = e.target.closest('.btn-editar');
      if (btnEditar) {
        editandoId = btnEditar.dataset.id;
        renderResultados();
        return;
      }

      const btnCancelar = e.target.closest('.btn-cancelar-edicao');
      if (btnCancelar) {
        editandoId = null;
        renderResultados();
        return;
      }

      const btnSalvar = e.target.closest('.btn-salvar-edicao');
      if (btnSalvar) {
        salvarEdicao(btnSalvar.dataset.id);
        return;
      }
    });

    // Carrega ao iniciar
    buscarRegistros();
  </script>
</body>
</html>

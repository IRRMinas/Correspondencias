<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📬 Gestão de Correios - IRR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .bg-dark { background: #0a0a0f; }
    .bg-card { background: #12121e; }
    .border-card { border-color: #2a2a3a; }
    .glow { box-shadow: 0 0 40px rgba(99, 102, 241, 0.1); }
    input, select, textarea {
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      color: #e2e8f0;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #6366f1;
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    input::placeholder, textarea::placeholder {
      color: #4a4a5a;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
    }
    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
    }
    .status-success { background: #064e3b; border-color: #10b981; color: #6ee7b7; }
    .status-error { background: #7f1d1d; border-color: #ef4444; color: #fca5a5; }
    .status-info { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
    .badge { background: #1a1a2e; color: #94a3b8; padding: 4px 12px; border-radius: 20px; font-size: 11px; }
  </style>
</head>
<body class="bg-dark text-slate-200 min-h-screen">

  <div class="max-w-4xl mx-auto p-4 md:p-6">
    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
      <div>
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-indigo-600/20 flex items-center justify-center">
            <i class="fas fa-envelope text-indigo-400 text-lg"></i>
          </div>
          <div>
            <h1 class="text-2xl font-extrabold text-white tracking-tight">Gestão de Correios</h1>
            <p class="text-xs text-slate-500">Instituto René Rachou - FIOCRUZ</p>
          </div>
        </div>
      </div>
      <div class="flex gap-2">
        <a href="dashboard.html" class="px-4 py-2 rounded-xl bg-card border border-card hover:border-indigo-500/50 text-sm text-slate-400 hover:text-white transition flex items-center gap-2">
          <i class="fas fa-chart-pie"></i> Dashboard
        </a>
        <a href="busca.html" class="px-4 py-2 rounded-xl bg-card border border-card hover:border-indigo-500/50 text-sm text-slate-400 hover:text-white transition flex items-center gap-2">
          <i class="fas fa-search"></i> Buscar
        </a>
      </div>
    </div>

    <!-- FORM CARD -->
    <div class="bg-card border border-card rounded-2xl p-6 glow">
      <div class="flex items-center gap-3 mb-6">
        <i class="fas fa-pen-to-square text-indigo-400"></i>
        <h2 class="text-lg font-semibold text-white">Novo Lançamento</h2>
        <span class="badge ml-auto">Preenchimento obrigatório</span>
      </div>

      <form id="formCorreio" class="space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Data -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">
              <i class="far fa-calendar mr-1"></i> Data do Envio
            </label>
            <input type="date" id="data" required class="w-full rounded-xl px-4 py-3 text-sm transition">
          </div>
          
          <!-- Quantidade -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">
              <i class="fas fa-hashtag mr-1"></i> Quantidade
            </label>
            <input type="number" id="quantidade" value="1" min="1" class="w-full rounded-xl px-4 py-3 text-sm transition">
          </div>
        </div>

        <!-- Tipo de Envio -->
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">
            <i class="fas fa-truck mr-1"></i> Tipo de Envio
          </label>
          <select id="tipoEnvio" class="w-full rounded-xl px-4 py-3 text-sm transition">
            <option value="SEDEX">SEDEX</option>
            <option value="SEDEX COM AR">SEDEX COM AR</option>
            <option value="SEDEX 10">SEDEX 10</option>
            <option value="Carta Simples">Carta Simples</option>
            <option value="CARTA REGISTRADA COM AR">CARTA REGISTRADA COM AR</option>
            <option value="Pacote">Pacote</option>
            <option value="Outro">Outro</option>
          </select>
        </div>

        <!-- Destinatário -->
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">
            <i class="fas fa-user mr-1"></i> Destinatário
          </label>
          <input type="text" id="destinatario" placeholder="Nome completo ou instituição" class="w-full rounded-xl px-4 py-3 text-sm transition">
        </div>

        <!-- Remetente -->
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">
            <i class="fas fa-user-pen mr-1"></i> Remetente <span class="text-red-400">*</span>
          </label>
          <input type="text" id="remetente" placeholder="Ex: Dr. Rômulo Paes" required class="w-full rounded-xl px-4 py-3 text-sm transition">
        </div>

        <!-- Grupo -->
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">
            <i class="fas fa-users mr-1"></i> Grupo / Setor <span class="text-red-400">*</span>
          </label>
          <select id="grupo" required class="w-full rounded-xl px-4 py-3 text-sm transition">
            <option value="">Selecione o grupo...</option>
            <option value="Diretoria/ IRR">Diretoria/ IRR</option>
            <option value="GIPB">GIPB</option>
            <option value="QPNB">QPNB</option>
            <option value="PSPS">PSPS</option>
            <option value="ICM">ICM</option>
            <option value="IP">IP</option>
            <option value="TRIATO">TRIATO</option>
            <option value="WMP">WMP</option>
            <option value="DCE">DCE</option>
            <option value="HMM">HMM</option>
            <option value="MV">MV</option>
            <option value="CRL">CRL</option>
            <option value="Memórias">Memórias</option>
            <option value="SENS">SENS</option>
            <option value="NESPE">NESPE</option>
            <option value="SGP">SGP</option>
            <option value="NGS">NGS</option>
            <option value="GFP">GFP</option>
            <option value="BMIM">BMIM</option>
            <option value="CVIP">CVIP</option>
            <option value="GEL">GEL</option>
            <option value="PCPP">PCPP</option>
            <option value="VDE">VDE</option>
            <option value="SEC">SEC</option>
            <option value="ASFOC">ASFOC</option>
            <option value="FIOSÁÚDE">FIOSÁÚDE</option>
            <option value="COLVET">COLVET</option>
            <option value="IB">IB</option>
            <option value="BIOTÉRIO">BIOTÉRIO</option>
            <option value="GETESA">GETESA</option>
            <option value="BIP">BIP</option>
            <option value="EM">EM</option>
          </select>
        </div>

        <!-- Valor -->
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">
            <i class="fas fa-money-bill-wave mr-1"></i> Valor <span class="text-red-400">*</span>
          </label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">R$</span>
            <input type="text" id="valor" placeholder="0,00" required class="w-full rounded-xl pl-10 pr-4 py-3 text-lg font-mono transition">
          </div>
          <p class="text-xs text-slate-500 mt-1">Digite apenas números - formatação automática</p>
        </div>

        <!-- Responsável e Observação -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">
              <i class="fas fa-id-badge mr-1"></i> Responsável
            </label>
            <input type="text" id="responsavel" placeholder="Quem registrou" class="w-full rounded-xl px-4 py-3 text-sm transition">
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">
              <i class="fas fa-comment mr-1"></i> Observação
            </label>
            <input type="text" id="observacao" placeholder="Informações adicionais" class="w-full rounded-xl px-4 py-3 text-sm transition">
          </div>
        </div>

        <!-- Botão -->
        <button type="submit" id="btnSalvar" class="w-full btn-primary text-white font-bold py-3.5 px-6 rounded-xl transition flex items-center justify-center gap-2 text-base">
          <i class="fas fa-save"></i>
          <span>Registrar Envio</span>
        </button>
      </form>

      <!-- Status -->
      <div id="status" class="hidden mt-5 p-4 rounded-xl border text-sm"></div>
    </div>

    <!-- Últimos Registros -->
    <div class="mt-8 bg-card border border-card rounded-2xl p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-semibold text-white flex items-center gap-2">
          <i class="fas fa-clock-rotate-left text-indigo-400"></i> Últimos Registros
        </h3>
        <a href="busca.html" class="text-xs text-indigo-400 hover:text-indigo-300 transition">Ver todos →</a>
      </div>
      <div id="ultimosRegistros" class="space-y-2">
        <div class="text-center text-slate-500 text-sm py-8">
          <i class="fas fa-spinner fa-spin mr-2"></i> Carregando...
        </div>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ SUBSTITUA PELA URL DO SEU APPS SCRIPT
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz1l2F9HMmhjEIhiuVf5fjFaHxeQtwNAucmS1fL4KUxFJjcuAKhBUkrqvDuPRht0PfreQ/exec";
                         

    // ============================================
    // FORMATAÇÃO DO VALOR
    // ============================================
    document.getElementById('valor').addEventListener('input', function(e) {
      let v = this.value.replace(/\D/g, '');
      if (v === '') return;
      
      let num = parseFloat(v) / 100;
      this.value = num.toFixed(2).replace('.', ',');
    });

    // ============================================
    // DATA PADRÃO
    // ============================================
    document.getElementById('data').value = new Date().toISOString().split('T')[0];

    // ============================================
    // ENVIO DO FORMULÁRIO
    // ============================================
    document.getElementById('formCorreio').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('btnSalvar');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
      status.className = 'hidden';

      const payload = {
        data: document.getElementById('data').value,
        quantidade: parseInt(document.getElementById('quantidade').value) || 1,
        tipoEnvio: document.getElementById('tipoEnvio').value,
        destinatario: document.getElementById('destinatario').value,
        remetente: document.getElementById('remetente').value,
        grupo: document.getElementById('grupo').value,
        valor: document.getElementById('valor').value,
        responsavel: document.getElementById('responsavel').value,
        observacao: document.getElementById('observacao').value
      };

      // Validação
      if (!payload.grupo || !payload.remetente || !payload.valor) {
        status.className = 'mt-5 p-4 rounded-xl border text-sm status-error block';
        status.innerHTML = '<i class="fas fa-exclamation-circle mr-2"></i> Preencha todos os campos obrigatórios (*)';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Registrar Envio';
        return;
      }

      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        status.className = 'mt-5 p-4 rounded-xl border text-sm status-success block';
        status.innerHTML = `
          <div class="flex items-center gap-2">
            <i class="fas fa-check-circle text-emerald-400"></i>
            <span>Lançamento registrado com sucesso! Os dados já estão disponíveis no dashboard.</span>
          </div>
        `;

        // Limpa campos
        document.getElementById('destinatario').value = '';
        document.getElementById('remetente').value = '';
        document.getElementById('responsavel').value = '';
        document.getElementById('observacao').value = '';
        document.getElementById('valor').value = '';
        document.getElementById('data').value = new Date().toISOString().split('T')[0];
        document.getElementById('quantidade').value = 1;

        // Recarrega últimos registros
        carregarUltimosRegistros();

      } catch (err) {
        status.className = 'mt-5 p-4 rounded-xl border text-sm status-error block';
        status.innerHTML = `<i class="fas fa-times-circle mr-2"></i> Erro: ${err.message}`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Registrar Envio';
      }
    });

    // ============================================
    // CARREGAR ÚLTIMOS REGISTROS
    // ============================================
    async function carregarUltimosRegistros() {
      try {
        const response = await fetch(`${WEB_APP_URL}?acao=buscar&limite=5`);
        const data = await response.json();
        
        const container = document.getElementById('ultimosRegistros');
        
        if (!data.sucesso || data.registros.length === 0) {
          container.innerHTML = `
            <div class="text-center text-slate-500 text-sm py-8">
              <i class="fas fa-inbox text-2xl block mb-2"></i>
              Nenhum registro encontrado
            </div>
          `;
          return;
        }

        container.innerHTML = data.registros.slice(0, 5).map(r => `
          <div class="flex items-center justify-between p-3 rounded-xl bg-slate-900/50 border border-slate-800/50 hover:border-indigo-500/30 transition">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="text-xs font-medium text-slate-400">${r.data ? new Date(r.data).toLocaleDateString('pt-BR') : '-'}</span>
                <span class="badge text-xs">${r.grupo || '-'}</span>
              </div>
              <p class="text-sm font-medium text-white truncate">${r.destinatario || 'Sem destinatário'}</p>
              <p class="text-xs text-slate-500 truncate">${r.remetente || '-'}</p>
            </div>
            <div class="text-right ml-4">
              <p class="text-sm font-bold text-emerald-400">${r.valor ? 'R$ ' + r.valor.toFixed(2).replace('.', ',') : 'R$ 0,00'}</p>
              <span class="text-xs text-slate-500">${r.tipoEnvio || 'SEDEX'}</span>
            </div>
          </div>
        `).join('');

      } catch (err) {
        console.error('Erro ao carregar registros:', err);
      }
    }

    // Carrega ao iniciar
    carregarUltimosRegistros();
  </script>
</body>
</html>
